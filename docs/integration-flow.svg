<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 800" role="img" aria-labelledby="title description">
  <title id="title">WooCommerce reporting integration flow</title>
  <desc id="description">WooCommerce REST API v3 sends authenticated data to Google Apps Script. Apps Script writes structured records to Google Sheets for Looker Studio reporting and also serves an HTML data viewer.</desc>

  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #475569; }
      .node-title { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #ffffff; }
      .node-copy { font-family: Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #ffffff; }
      .label { font-family: Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #334155; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; }
    </style>
  </defs>

  <rect width="720" height="800" rx="22" fill="#f8fafc"/>
  <text x="360" y="40" text-anchor="middle" class="title">WooCommerce Reporting Integration</text>
  <text x="360" y="66" text-anchor="middle" class="subtitle">API ingestion, spreadsheet storage, reporting, and browser display</text>

  <g>
    <rect x="110" y="100" width="500" height="95" rx="18" fill="#96588a"/>
    <text x="150" y="140" class="node-title">WooCommerce REST API v3</text>
    <text x="150" y="167" class="node-copy">Products and orders · /wp-json/wc/v3</text>
  </g>

  <path d="M 360 195 L 360 265" class="arrow"/>
  <path d="M 352 253 L 360 267 L 368 253 Z" fill="#64748b"/>
  <rect x="390" y="216" width="178" height="28" rx="14" fill="#e2e8f0"/>
  <text x="479" y="235" text-anchor="middle" class="label">HTTPS + Basic Auth</text>

  <g>
    <rect x="110" y="270" width="500" height="100" rx="18" fill="#f9ab00"/>
    <text x="150" y="312" class="node-title">Google Apps Script</text>
    <text x="150" y="339" class="node-copy">Fetch · validate · normalize · route</text>
  </g>

  <path d="M 300 370 L 300 420 L 180 420 L 180 465" class="arrow"/>
  <path d="M 420 370 L 420 420 L 540 420 L 540 465" class="arrow"/>
  <path d="M 172 453 L 180 467 L 188 453 Z" fill="#64748b"/>
  <path d="M 532 453 L 540 467 L 548 453 Z" fill="#64748b"/>
  <rect x="120" y="404" width="160" height="28" rx="14" fill="#e2e8f0"/>
  <text x="200" y="423" text-anchor="middle" class="label">Structured records</text>
  <rect x="440" y="404" width="160" height="28" rx="14" fill="#e2e8f0"/>
  <text x="520" y="423" text-anchor="middle" class="label">Web app response</text>

  <g>
    <rect x="30" y="470" width="300" height="105" rx="18" fill="#188038"/>
    <text x="70" y="512" class="node-title">Google Sheets</text>
    <text x="70" y="539" class="node-copy">Products and Orders tabs</text>
  </g>

  <g>
    <rect x="390" y="470" width="300" height="105" rx="18" fill="#334155"/>
    <text x="430" y="512" class="node-title">HTML Data Viewer</text>
    <text x="430" y="539" class="node-copy">Safe, read-only table display</text>
  </g>

  <path d="M 180 575 L 180 680" class="arrow"/>
  <path d="M 172 668 L 180 682 L 188 668 Z" fill="#64748b"/>
  <rect x="205" y="614" width="178" height="28" rx="14" fill="#e2e8f0"/>
  <text x="294" y="633" text-anchor="middle" class="label">Reporting data source</text>

  <g>
    <rect x="30" y="685" width="300" height="85" rx="18" fill="#4285f4"/>
    <text x="70" y="721" class="node-title">Looker Studio</text>
    <text x="70" y="747" class="node-copy">Reports and dashboards</text>
  </g>
</svg>
