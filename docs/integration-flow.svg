<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" role="img" aria-labelledby="title description">
  <title id="title">WooCommerce reporting integration flow</title>
  <desc id="description">WooCommerce REST API v3 sends authenticated data to Google Apps Script. Apps Script writes structured records to Google Sheets for Looker Studio reporting and also serves an HTML data viewer.</desc>

  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 15px; font-weight: 400; fill: #475569; }
      .node-title { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #ffffff; }
      .node-copy { font-family: Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #ffffff; }
      .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #334155; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1000" height="720" rx="24" fill="#f8fafc"/>
  <text x="500" y="44" text-anchor="middle" class="title">WooCommerce Reporting Integration</text>
  <text x="500" y="70" text-anchor="middle" class="subtitle">Authenticated data ingestion, spreadsheet storage, reporting, and browser display</text>

  <g>
    <rect x="300" y="105" width="400" height="100" rx="18" fill="#96588a"/>
    <text x="340" y="147" class="node-title">WooCommerce REST API v3</text>
    <text x="340" y="174" class="node-copy">Products and orders · /wp-json/wc/v3</text>
  </g>

  <path d="M 500 205 L 500 280" class="arrow"/>
  <path d="M 492 270 L 500 283 L 508 270 Z" fill="#64748b"/>
  <g>
    <rect x="528" y="225" width="190" height="30" rx="15" fill="#e2e8f0"/>
    <text x="623" y="245" text-anchor="middle" class="label">HTTPS + Basic Auth</text>
  </g>

  <g>
    <rect x="300" y="285" width="400" height="110" rx="18" fill="#f9ab00"/>
    <text x="340" y="330" class="node-title">Google Apps Script</text>
    <text x="340" y="357" class="node-copy">Fetch · validate · normalize · route</text>
  </g>

  <path d="M 430 395 L 430 430 L 220 430 L 220 475" class="arrow"/>
  <path d="M 570 395 L 570 430 L 780 430 L 780 475" class="arrow"/>
  <path d="M 212 465 L 220 478 L 228 465 Z" fill="#64748b"/>
  <path d="M 772 465 L 780 478 L 788 465 Z" fill="#64748b"/>

  <g>
    <rect x="245" y="414" width="168" height="30" rx="15" fill="#e2e8f0"/>
    <text x="329" y="434" text-anchor="middle" class="label">Structured records</text>
    <rect x="595" y="414" width="165" height="30" rx="15" fill="#e2e8f0"/>
    <text x="678" y="434" text-anchor="middle" class="label">Web app response</text>
  </g>

  <g>
    <rect x="70" y="480" width="300" height="105" rx="18" fill="#188038"/>
    <text x="110" y="522" class="node-title">Google Sheets</text>
    <text x="110" y="549" class="node-copy">Products and Orders tabs</text>
  </g>

  <g>
    <rect x="630" y="480" width="300" height="105" rx="18" fill="#334155"/>
    <text x="670" y="522" class="node-title">HTML Data Viewer</text>
    <text x="670" y="549" class="node-copy">Safe, read-only table display</text>
  </g>

  <path d="M 220 585 L 220 630" class="arrow"/>
  <path d="M 212 620 L 220 633 L 228 620 Z" fill="#64748b"/>
  <g>
    <rect x="245" y="593" width="185" height="30" rx="15" fill="#e2e8f0"/>
    <text x="338" y="613" text-anchor="middle" class="label">Reporting data source</text>
  </g>

  <g>
    <rect x="70" y="635" width="300" height="65" rx="18" fill="#4285f4"/>
    <text x="110" y="663" class="node-title">Looker Studio</text>
    <text x="110" y="685" class="node-copy">Reports and dashboards</text>
  </g>
</svg>
